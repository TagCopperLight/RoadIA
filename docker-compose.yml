services:
  client:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-roadia}/roadia-client:latest
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    restart: unless-stopped

  server:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-roadia}/roadia-server:latest
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - RUST_LOG=info
    restart: unless-stopped

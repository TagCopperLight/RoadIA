<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 620" role="img" aria-labelledby="title desc">
  <title id="title">Courbes Beta du scheduling</title>
  <desc id="desc">Courbe normalisée du temps de départ 12h * Beta(6.33, 3.67) et du temps de stationnement 12h * Beta(7.25, 2.75).</desc>
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .grid { stroke: #e8edf3; stroke-width: 1; }
      .axis { stroke: #425466; stroke-width: 2; }
      .tick { stroke: #425466; stroke-width: 1.5; }
      .title { font: 700 24px sans-serif; fill: #10233f; }
      .subtitle { font: 400 14px sans-serif; fill: #5d6b82; }
      .label { font: 400 13px sans-serif; fill: #425466; }
      .legend { font: 600 15px sans-serif; fill: #10233f; }
      .curve-start { fill: none; stroke: #d94848; stroke-width: 4; stroke-linejoin: round; stroke-linecap: round; }
      .curve-dwell { fill: none; stroke: #2f80ed; stroke-width: 4; stroke-linejoin: round; stroke-linecap: round; }
      .marker-start { fill: #d94848; }
      .marker-dwell { fill: #2f80ed; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1000" height="620" rx="18"/>

  <text class="title" x="500" y="38" text-anchor="middle">Lois Beta utilisées pour le scheduling</text>
  <text class="subtitle" x="500" y="60" text-anchor="middle">Axe horizontal : heures (0 à 12) • Axe vertical : densité relative normalisée</text>

  <!-- Plot area -->
  <!-- left=90 top=80 right=910 bottom=530 -->
  <line class="grid" x1="90" y1="530" x2="910" y2="530"/>
  <line class="grid" x1="90" y1="455" x2="910" y2="455"/>
  <line class="grid" x1="90" y1="380" x2="910" y2="380"/>
  <line class="grid" x1="90" y1="305" x2="910" y2="305"/>
  <line class="grid" x1="90" y1="230" x2="910" y2="230"/>
  <line class="grid" x1="90" y1="155" x2="910" y2="155"/>
  <line class="grid" x1="90" y1="80" x2="910" y2="80"/>

  <line class="grid" x1="90" y1="80" x2="90" y2="530"/>
  <line class="grid" x1="158.3" y1="80" x2="158.3" y2="530"/>
  <line class="grid" x1="226.7" y1="80" x2="226.7" y2="530"/>
  <line class="grid" x1="295" y1="80" x2="295" y2="530"/>
  <line class="grid" x1="363.3" y1="80" x2="363.3" y2="530"/>
  <line class="grid" x1="431.7" y1="80" x2="431.7" y2="530"/>
  <line class="grid" x1="500" y1="80" x2="500" y2="530"/>
  <line class="grid" x1="568.3" y1="80" x2="568.3" y2="530"/>
  <line class="grid" x1="636.7" y1="80" x2="636.7" y2="530"/>
  <line class="grid" x1="705" y1="80" x2="705" y2="530"/>
  <line class="grid" x1="773.3" y1="80" x2="773.3" y2="530"/>
  <line class="grid" x1="841.7" y1="80" x2="841.7" y2="530"/>
  <line class="grid" x1="910" y1="80" x2="910" y2="530"/>

  <line class="axis" x1="90" y1="530" x2="910" y2="530"/>
  <line class="axis" x1="90" y1="530" x2="90" y2="80"/>

  <!-- Tick labels -->
  <text class="label" x="90" y="552" text-anchor="middle">0h</text>
  <text class="label" x="295" y="552" text-anchor="middle">3h</text>
  <text class="label" x="500" y="552" text-anchor="middle">6h</text>
  <text class="label" x="705" y="552" text-anchor="middle">9h</text>
  <text class="label" x="910" y="552" text-anchor="middle">12h</text>

  <text class="label" x="72" y="534" text-anchor="end">0</text>
  <text class="label" x="72" y="459" text-anchor="end">0,2</text>
  <text class="label" x="72" y="384" text-anchor="end">0,4</text>
  <text class="label" x="72" y="309" text-anchor="end">0,6</text>
  <text class="label" x="72" y="234" text-anchor="end">0,8</text>
  <text class="label" x="72" y="159" text-anchor="end">1,0</text>

  <text class="label" x="500" y="590" text-anchor="middle">Temps (heures)</text>
  <text class="label" x="24" y="305" text-anchor="middle" transform="rotate(-90 24 305)">Densité relative</text>

  <!-- Departure curve: 12h * Beta(6.33, 3.67) -->
  <path class="curve-start" d="M 90 530 L 158 526 L 227 517 L 295 496 L 363 453 L 432 380 L 500 272 L 568 165 L 637 100 L 705 143 L 773 272 L 842 444 L 910 530"/>

  <!-- Dwell curve: 12h * Beta(7.25, 2.75) -->
  <path class="curve-dwell" d="M 90 530 L 158 528 L 227 524 L 295 513 L 363 487 L 432 435 L 500 358 L 568 259 L 637 165 L 705 100 L 773 135 L 842 294 L 910 530"/>

  <circle class="marker-start" cx="637" cy="100" r="5"/>
  <circle class="marker-dwell" cx="705" cy="100" r="5"/>

  <rect x="650" y="78" width="255" height="78" rx="10" fill="#f8fbff" stroke="#dfe6ef"/>
  <line x1="670" y1="105" x2="710" y2="105" class="curve-start"/>
  <text class="legend" x="720" y="110">Départ : 12h × Beta(6.33, 3.67)</text>
  <line x1="670" y1="132" x2="710" y2="132" class="curve-dwell"/>
  <text class="legend" x="720" y="137">Stationnement : 12h × Beta(7.25, 2.75)</text>
</svg>

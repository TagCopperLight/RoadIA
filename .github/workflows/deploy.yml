name: Deploy to VPS

on:
  push:
    branches:
      - dev
      - infra/docker

env:
  REGISTRY: ghcr.io

jobs:
  # This job prepares variables to be used in other jobs
  prep:
    runs-on: ubuntu-latest
    outputs:
      owner: ${{ steps.vars.outputs.owner }}
    steps:
      - name: Set lower case owner
        id: vars
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_OUTPUT
        env:
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}

  build-and-push:
    name: Build and Push Docker Images
    needs: prep
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Client Image
        uses: docker/build-push-action@v5
        with:
          context: ./client
          push: true
          tags: ${{ env.REGISTRY }}/${{ needs.prep.outputs.owner }}/roadia-client:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Server Image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: ${{ env.REGISTRY }}/${{ needs.prep.outputs.owner }}/roadia-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    needs: [prep, build-and-push]
    runs-on: ubuntu-latest
    
    steps:
      - name: Execute deployment commands via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          # Explicitly pass the output from the prep job into the step environment
          REPO_OWNER: ${{ needs.prep.outputs.owner }}
          REPO_FULL_NAME: ${{ github.repository }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: REPO_OWNER, REPO_FULL_NAME
          script: |
            # Create app directory if it doesn't exist
            mkdir -p ~/roadia
            cd ~/roadia
            
            # Pull the latest docker-compose.yml
            # We use REPO_FULL_NAME here because GitHub URLs are case-sensitive and match the repo name
            curl -O https://raw.githubusercontent.com/$REPO_FULL_NAME/dev/docker-compose.yml
            
            # Login to GHCR
            echo ${{ secrets.GHCR_PAT }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Export the lowercase owner for docker-compose
            export GITHUB_REPOSITORY_OWNER=$REPO_OWNER
            
            # Pull and restart
            docker compose pull
            docker compose up -d
            docker image prune -f
